version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"
      typescript:
        patterns:
          - "typescript"
          - "@types/*"
      hono:
        patterns:
          - "hono"
          - "@hono/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3

  - package-ecosystem: cargo
    directory: /apps/desktop/src-tauri
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
