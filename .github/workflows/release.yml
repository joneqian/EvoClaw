name: Release

# M14 PR-A5: 跨平台打包入口
# 触发方式：手动 workflow_dispatch（不在 push/PR 自动跑，避免大量 runner 消耗）
# 产物：macOS DMG + Windows NSIS EXE 上传到 GitHub Actions artifact
# 签名：未签名（D3 决策，详见 docs/iteration-plans/M14-CrossPlatform-Plan.md §八.5）

on:
  workflow_dispatch:
    inputs:
      brand:
        description: '品牌'
        required: true
        default: 'evoclaw'
        type: choice
        options:
          - evoclaw
          - healthclaw

permissions:
  contents: read

# 同 brand 同 ref 的多个 release 串行，避免 artifact 名字冲突
concurrency:
  group: release-${{ github.ref }}-${{ inputs.brand }}
  cancel-in-progress: false

jobs:
  release-mac:
    name: Build macOS DMG (${{ inputs.brand }})
    runs-on: macos-latest
    timeout-minutes: 30
    env:
      BRAND: ${{ inputs.brand }}

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build DMG
        run: pnpm build:dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.brand }}-macos-dmg
          path: apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 14

  release-windows:
    name: Build Windows NSIS EXE (${{ inputs.brand }})
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      BRAND: ${{ inputs.brand }}

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build NSIS EXE
        run: node scripts/build-exe.mjs

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.brand }}-windows-exe
          path: apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 14
