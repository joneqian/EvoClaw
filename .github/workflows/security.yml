name: Security

# detection-only 供应链漏洞扫描：发现高危漏洞贴 PR 评论 + 上报 GitHub Security tab，
# 但不阻塞 merge。覆盖 npm（pnpm-lock.yaml）+ Cargo（apps/desktop/src-tauri/Cargo.lock）。

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # 每周一 UTC 12:00 全量扫描，捕获新披露的 CVE
    - cron: '0 12 * * 1'
  workflow_dispatch:

permissions:
  # 上传 SARIF 到 GitHub Security tab 需要 security-events: write
  actions: read
  contents: read
  security-events: write

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  osv-scan:
    name: OSV-Scanner (detection-only)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # PR 模式拉完整历史以便 diff scan 准确
          fetch-depth: 2

      - name: Run OSV-Scanner
        # continue-on-error: true 让"发现漏洞" 不阻塞 PR merge
        # detection-only 阶段我们依靠 GitHub Security tab + PR annotation 通知开发
        # 后续若需升级到"阻塞 critical 漏洞"，把这行删掉并配 --fail-on-vuln
        continue-on-error: true
        uses: google/osv-scanner-action/osv-scanner-action@v2
        with:
          scan-args: |-
            --format=sarif
            --output=results.sarif
            --recursive
            --skip-git
            --lockfile=pnpm-lock.yaml
            --lockfile=apps/desktop/src-tauri/Cargo.lock

      - name: Upload SARIF to GitHub Security
        # if: always() 保证即使 OSV-Scanner step 失败也尝试上传已生成的 SARIF
        if: always() && hashFiles('results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: osv-scanner

      - name: Upload SARIF as workflow artifact
        # 即使没有 security-events 权限也可下载查看
        if: always() && hashFiles('results.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: osv-scanner-sarif
          path: results.sarif
          retention-days: 30
