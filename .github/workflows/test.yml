name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint + Typecheck + Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Configure git identity
        run: |
          git config --global user.name "ci-bot"
          git config --global user.email "ci-bot@evoclaw.local"

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.14.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Version consistency check
        run: pnpm version:check

      - name: Apply brand (evoclaw)
        run: pnpm brand:apply

      - name: Build shared + core
        run: |
          pnpm --filter @evoclaw/shared build
          pnpm --filter @evoclaw/core build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test
        env:
          CI: 'true'
