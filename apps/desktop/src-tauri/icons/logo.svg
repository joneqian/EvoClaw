<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- EvoClaw Mascot Chameleon Logo -->

  <defs>
    <!-- Body gradient: deep teal-blue top to bright cyan-green bottom -->
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a5c6b"/>
      <stop offset="100%" stop-color="#00d4aa"/>
    </linearGradient>

    <!-- Darker shade for arms/legs -->
    <linearGradient id="limbGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#186060"/>
      <stop offset="100%" stop-color="#145050"/>
    </linearGradient>

    <!-- Tail gradient -->
    <linearGradient id="tailGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a5c6b"/>
      <stop offset="100%" stop-color="#00d4aa"/>
    </linearGradient>

    <!-- Crest gradient -->
    <linearGradient id="crestGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#1a5c6b"/>
      <stop offset="100%" stop-color="#1a4a6b"/>
    </linearGradient>

    <!-- Subtle circuit pattern -->
    <pattern id="circuit" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="8" cy="8" r="1.2" fill="#00d4aa" opacity="0.05"/>
      <circle cx="24" cy="24" r="1.2" fill="#00d4aa" opacity="0.05"/>
      <line x1="8" y1="8" x2="24" y2="8" stroke="#00d4aa" stroke-width="0.4" opacity="0.04"/>
      <line x1="24" y1="8" x2="24" y2="24" stroke="#00d4aa" stroke-width="0.4" opacity="0.04"/>
    </pattern>
  </defs>

  <!-- ======== LEGS (behind body) ======== -->
  <!-- Left leg -->
  <rect x="200" y="400" width="28" height="45" rx="12" fill="url(#limbGrad)"/>
  <!-- Right leg -->
  <rect x="284" y="400" width="28" height="45" rx="12" fill="url(#limbGrad)"/>

  <!-- Left leg claws -->
  <circle cx="206" cy="446" r="4" fill="#00d4aa"/>
  <circle cx="214" cy="448" r="4" fill="#00d4aa"/>
  <circle cx="222" cy="446" r="4" fill="#00d4aa"/>

  <!-- Right leg claws -->
  <circle cx="290" cy="446" r="4" fill="#00d4aa"/>
  <circle cx="298" cy="448" r="4" fill="#00d4aa"/>
  <circle cx="306" cy="446" r="4" fill="#00d4aa"/>

  <!-- ======== ARMS (behind body) ======== -->
  <!-- Left arm -->
  <ellipse cx="102" cy="278" rx="28" ry="22" fill="url(#limbGrad)"/>
  <!-- Right arm -->
  <ellipse cx="410" cy="278" rx="28" ry="22" fill="url(#limbGrad)"/>

  <!-- ======== TAIL (behind body, curling up from top-right) ======== -->
  <path d="M 340,145
           C 365,120 395,85 390,55
           C 385,28 360,15 338,25
           C 315,35 310,60 325,75
           C 340,90 358,80 355,65
           C 353,55 342,52 338,60"
        stroke="url(#tailGrad)" stroke-width="14" stroke-linecap="round" fill="none"/>

  <!-- ======== MAIN BODY ======== -->
  <circle cx="256" cy="270" r="155" fill="url(#bodyGrad)"/>

  <!-- Circuit pattern overlay on body -->
  <circle cx="256" cy="270" r="155" fill="url(#circuit)"/>

  <!-- ======== BELLY PATCH ======== -->
  <ellipse cx="256" cy="295" rx="95" ry="85" fill="#4aedc4" opacity="0.2"/>

  <!-- ======== HEAD CREST ======== -->
  <polygon points="240,158 256,105 272,158" fill="url(#crestGrad)"/>
  <!-- Small crest accent -->
  <polygon points="247,155 256,118 265,155" fill="#1a4a6b" opacity="0.5"/>

  <!-- ======== EYE STALKS (protruding turret eyes) ======== -->
  <!-- Left eye stalk connection (body-colored bump) -->
  <ellipse cx="195" cy="185" rx="48" ry="48" fill="url(#bodyGrad)"/>
  <!-- Right eye stalk connection -->
  <ellipse cx="317" cy="185" rx="48" ry="48" fill="url(#bodyGrad)"/>

  <!-- Left eye - white sclera -->
  <circle cx="195" cy="175" r="30" fill="white"/>
  <!-- Left pupil -->
  <circle cx="200" cy="175" r="15" fill="#0a1525"/>
  <!-- Left eye highlight large -->
  <circle cx="190" cy="167" r="7" fill="white" opacity="0.95"/>
  <!-- Left eye highlight small -->
  <circle cx="206" cy="180" r="3.5" fill="white" opacity="0.7"/>

  <!-- Right eye - white sclera -->
  <circle cx="317" cy="175" r="30" fill="white"/>
  <!-- Right pupil -->
  <circle cx="322" cy="175" r="15" fill="#0a1525"/>
  <!-- Right eye highlight large -->
  <circle cx="312" cy="167" r="7" fill="white" opacity="0.95"/>
  <!-- Right eye highlight small -->
  <circle cx="328" cy="180" r="3.5" fill="white" opacity="0.7"/>

  <!-- ======== MOUTH ======== -->
  <path d="M 220,320 Q 256,348 292,320"
        stroke="#0d2840" stroke-width="3.5" stroke-linecap="round" fill="none"/>

  <!-- ======== NOSTRILS ======== -->
  <circle cx="240" cy="295" r="3" fill="#0d2840" opacity="0.5"/>
  <circle cx="272" cy="295" r="3" fill="#0d2840" opacity="0.5"/>

</svg>